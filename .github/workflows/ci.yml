name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Test renderer
        run: npm test

      - name: Check Rust formatting
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust backend
        run: cargo test --locked --all-targets --manifest-path src-tauri/Cargo.toml

      - name: Check Rust targets
        run: cargo check --locked --all-targets --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust targets
        run: cargo clippy --locked --all-targets --manifest-path src-tauri/Cargo.toml -- -D warnings
