name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows installers
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Test renderer
        run: npm test

      - name: Check Rust formatting
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust backend
        run: cargo test --locked --all-targets --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust targets
        run: cargo clippy --locked --all-targets --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build Windows installers
        run: npm run app:build

      - name: Stage release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "src-tauri/target/release/bundle/nsis/AI Usage Dashboard_${version}_x64-setup.exe" `
            "release/AI-Usage-Dashboard_${version}_x64-setup.exe"
          Copy-Item "src-tauri/target/release/bundle/msi/AI Usage Dashboard_${version}_x64_en-US.msi" `
            "release/AI-Usage-Dashboard_${version}_x64_en-US.msi"
          Get-ChildItem release -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii release/SHA256SUMS.txt

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "docs/releases/$($env:GITHUB_REF_NAME).md"
          $assets = Get-ChildItem release -File | ForEach-Object FullName
          gh release create $env:GITHUB_REF_NAME @assets `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title "AI Usage Dashboard $($env:GITHUB_REF_NAME)" `
            --notes-file $notes
